# Fetches Vizra pricing and updates pricing.json in the repo.
# Architecture: GitHub Action → pricing.json → frontend (avoids browser rate limits).
name: Update pricing

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Fetch Vizra and write pricing.json
        run: node scripts/update-pricing.js

      # Commit and push only when pricing.json content changed (avoids empty commits)
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pricing.json
          if git diff --staged --quiet -- pricing.json; then
            echo "No pricing changes"
          else
            git commit -m "chore: update pricing.json from Vizra API"
            git push
          fi
